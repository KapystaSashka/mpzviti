<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація присутності — ВІТІ МПЗ</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
        .attend-card { background:var(--bg-card); border:1px solid var(--border-accent); border-top:3px solid var(--accent); border-radius:var(--radius-lg); padding:2rem; width:100%; max-width:420px; box-shadow:0 0 40px rgba(0,229,160,0.08); }
        .attend-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:0.3rem; }
        .attend-event { font-family:var(--font-display); font-size:1rem; color:var(--text-main); margin-bottom:0.3rem; font-weight:600; }
        .attend-meta { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); margin-bottom:1.5rem; }
        .attend-count { font-family:var(--font-mono); font-size:0.8rem; color:var(--accent); margin-bottom:1.5rem; background:rgba(0,229,160,0.08); padding:8px 12px; border-radius:var(--radius); border:1px solid rgba(0,229,160,0.2); }
        .success-box { text-align:center; padding:1rem 0; }
        .success-icon { font-size:3rem; margin-bottom:1rem; }
        .success-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; color:var(--accent); letter-spacing:1px; }
        .success-sub { font-family:var(--font-mono); font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem; }
        .error-box { text-align:center; padding:1rem 0; }
        .error-icon { font-size:2.5rem; margin-bottom:0.8rem; }
        .error-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--amber); letter-spacing:1px; }
        .error-sub { font-family:var(--font-mono); font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem; }
        .badge { display:inline-block; font-family:var(--font-mono); font-size:0.65rem; padding:2px 8px; border-radius:2px; background:rgba(0,229,160,0.15); color:var(--accent); border:1px solid rgba(0,229,160,0.3); letter-spacing:1px; margin-bottom:1.2rem; }
    </style>
</head>
<body>
    <div class="attend-card">
        <div class="badge">⚡ СИСТЕМА МПЗ ВІТІ // QR-РЕЄСТРАЦІЯ</div>

        <div id="formSection">
            <div class="attend-title">Реєстрація присутності</div>
            <div class="attend-event">{{ event.title }}</div>
            <div class="attend-meta">📅 {{ event.date }} &nbsp;|&nbsp; 📍 {{ event.location }}</div>
            <div class="attend-count" id="attendCount">
                👥 Вже зареєстровано: <strong>{{ event.attendance }}</strong> осіб
            </div>

            <div class="form-group">
                <label class="form-label">ПІБ *</label>
                <input type="text" class="form-input" id="fullName" placeholder="Прізвище Ім'я По-батькові" autocomplete="name">
            </div>
            <div class="form-group">
                <label class="form-label">Звання</label>
                <input type="text" class="form-input" id="rankInput" placeholder="Наприклад: курсант, сержант...">
            </div>
            <div class="form-group">
                <label class="form-label">Група / Підрозділ</label>
                <input type="text" class="form-input" id="groupInput" placeholder="Наприклад: 221, 1-й факультет...">
            </div>

            <div id="formError" style="display:none; color:var(--red); font-family:var(--font-mono); font-size:0.75rem; margin-bottom:0.8rem;"></div>

            <button onclick="register()" class="btn-submit" id="submitBtn">
                ✓ Підтвердити присутність
            </button>
        </div>

        <div id="successSection" style="display:none;">
            <div class="success-box">
                <div class="success-icon">✅</div>
                <div class="success-title">ПРИСУТНІСТЬ ЗАФІКСОВАНА</div>
                <div class="success-sub" id="successName"></div>
                <div class="success-sub" style="margin-top:4px;">Дякуємо за участь у заході</div>
            </div>
        </div>

        <div id="duplicateSection" style="display:none;">
            <div class="error-box">
                <div class="error-icon">⚠️</div>
                <div class="error-title">ВЖЕ ЗАРЕЄСТРОВАНО</div>
                <div class="error-sub" id="duplicateName"></div>
                <div class="error-sub" style="margin-top:4px;">Ви вже були зареєстровані на цей захід</div>
            </div>
        </div>

        <div id="errorSection" style="display:none;">
            <div class="error-box">
                <div class="error-icon">❌</div>
                <div class="error-title" id="errorTitle">Помилка</div>
                <div class="error-sub" id="errorSub"></div>
            </div>
        </div>
    </div>

    <script>
        async function register() {
            const fullName = document.getElementById('fullName').value.trim();
            const rank = document.getElementById('rankInput').value.trim();
            const group = document.getElementById('groupInput').value.trim();
            const errEl = document.getElementById('formError');

            if (!fullName) {
                errEl.textContent = '⚠ Введіть ПІБ';
                errEl.style.display = 'block';
                return;
            }
            errEl.style.display = 'none';

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Реєстрація...';

            try {
                const res = await fetch(window.location.pathname, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, rank, group_name: group })
                });
                const data = await res.json();

                document.getElementById('formSection').style.display = 'none';

                if (res.ok) {
                    document.getElementById('successName').textContent =
                        [rank, fullName, group ? '(' + group + ')' : ''].filter(Boolean).join(' ');
                    document.getElementById('successSection').style.display = 'block';
                } else if (res.status === 409) {
                    document.getElementById('duplicateName').textContent = fullName;
                    document.getElementById('duplicateSection').style.display = 'block';
                } else {
                    document.getElementById('errorTitle').textContent = data.error || 'Помилка';
                    document.getElementById('errorSub').textContent = 'Реєстрація для цього заходу закрита';
                    document.getElementById('errorSection').style.display = 'block';
                }
            } catch(err) {
                btn.disabled = false;
                btn.textContent = '✓ Підтвердити присутність';
                errEl.textContent = '⚠ Помилка мережі, спробуйте ще раз';
                errEl.style.display = 'block';
            }
        }

        // Enter key submit
        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
